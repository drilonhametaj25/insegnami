services:
  # Next.js Application
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: insegnami-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Use Docker network hostname for database (postgres service name)
      - DATABASE_URL=postgresql://${POSTGRES_USER:-insegnami}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-insegnami}?schema=public
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - REDIS_URL=redis://redis:6379
      # SMTP configuration
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM:-info@drilonhametaj.it}
      - EMAIL_FROM=${EMAIL_FROM:-info@drilonhametaj.it}
      - MODE=${MODE:-saas}
    # Security hardening
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - insegnami_network
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); const req = http.get('http://localhost:3000/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }); req.on('error', () => process.exit(1));"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: insegnami-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-insegnami}
      POSTGRES_USER: ${POSTGRES_USER:-insegnami}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-insegnami} -d ${POSTGRES_DB:-insegnami}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - insegnami_network

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: insegnami-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - insegnami_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  insegnami_network:
    driver: bridge
